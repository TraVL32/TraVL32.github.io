<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Использование inline-block</title>
    <style type="text/css">
        .wrapper {
            width: 1000px;
            margin: 0 auto;
            font-size: 0;
        }
        .wrapper > div {
            box-sizing: border-box;
            padding: 10px;
            display: inline-block;
            vertical-align: top;
            font-size: 16px;
        }
        #left {
            background: #ccf; width: 200px;
        }
        #center {
            background: #cfc; width: 600px;
        }
        #right {
            background: #fcc; width: 200px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="left">left<br>left<br>left<br>left<br>left</div>
        <div id="center">Далеко-далеко за словесными горами в стране гласных...</div>
        <div id="right">right<br>right<br>right<br>right</div>
    </div>
</body>
</html>
