<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма регистрации пользователя</title>
    <style>
        .form-row {
            margin-bottom: 10px; display: flex;
        }
        .form-label {
            width: 120px;
        }
    </style>
</head>
<body>
    <h1>Форма регистрации пользователя</h1>
    
    <form action="#" method="post">
        <div class="form-row">
            <label class="form-label" for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Введите e-mail" required>
        </div>

        <div class="form-row">
            <label class="form-label" for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required>
        </div>

        <div class="form-row">
            <span class="form-label">Пол</span>
            <input type="radio" id="male" name="gender" value="male" checked>
            <label for="male">Мужчина</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Женщина</label>
        </div>

        <div class="form-row">
            <label class="form-label" for="year">Год рождения</label>
            <select id="year" name="year">
                <option value="1981">1981</option>
                <option value="1982">1982</option>
            </select> -й
        </div>

        <div class="form-row">
            <span class="form-label">Я знаю</span>
            <div style="display: flex; flex-direction: column;">
                <div>
                    <input type="checkbox" id="lang_ru" name="lang" value="ru" checked disabled>
                    <label for="lang_ru">Русский</label>
                </div>
                <div>
                    <input type="checkbox" id="lang_es" name="lang" value="es">
                    <label for="lang_es">Испанский</label>
                </div>
                <div>
                    <input type="checkbox" id="lang_de" name="lang" value="de">
                    <label for="lang_de">Немецкий</label>
                </div>
                <div>
                    <input type="checkbox" id="lang_en" name="lang" value="en">
                    <label for="lang_en">Английский</label>
                </div>
                <div>
                    <input type="checkbox" id="lang_cn" name="lang" value="cn">
                    <label for="lang_cn">Китайский</label>
                </div>
            </div>
        </div>

        <div class="form-row">
            <label class="form-label" for="about">Обо мне</label>
            <textarea id="about" name="about" rows="5" cols="40" placeholder="Напишите коротко о себе"></textarea>
        </div>

        <div class="form-row" style="margin-left: 120px;">
            <button type="submit">Готово</button>
            <button type="reset" style="margin-left: 10px;">Очистить</button>
        </div>
    </form>
</body>
</html>
